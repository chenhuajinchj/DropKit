name: DropKit
options:
  bundleIdPrefix: com.dropkit
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "1.0.6"
    CURRENT_PROJECT_VERSION: "1.0.6"

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.4.0

targets:
  DropKit:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "**/*.md"
          - ".DS_Store"
    resources:
      - Resources
    dependencies:
      - package: KeyboardShortcuts
    info:
      path: Sources/Info.plist
      properties:
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        CFBundleName: $(PRODUCT_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.utilities
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        LSUIElement: true
    entitlements:
      path: Sources/DropKit.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
    settings:
      base:
        ENABLE_APP_SANDBOX: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.dropkit.DropKit
        PRODUCT_NAME: DropKit
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_OPTIMIZATION_LEVEL: -Onone
          CODE_SIGN_ENTITLEMENTS: Sources/DropKit.entitlements
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -Osize
          CODE_SIGN_ENTITLEMENTS: Sources/DropKit.entitlements

  DropKitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: DropKit
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.dropkit.DropKit.tests

schemes:
  DropKit:
    build:
      targets:
        DropKit: all
        DropKitTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - DropKitTests
    profile:
      config: Release
    archive:
      config: Release
